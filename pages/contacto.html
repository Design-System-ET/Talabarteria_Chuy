<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">

    <meta property="og:title" content="Plantilla Web moderna con Vite y Bootstrap">
    <meta property="og:description" content="Plantilla web lista para comenzar con Vite, Bootstrap, Font Awesome y SweetAlert2.">

    <link rel="canonical" href="https://www.example.com/">

    <title>Talabarteria Chuy</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">

    <!--Bootstrap Icons-->
    <link rel="stylesheet" href="../src/assets/css/bootstrap-icons.min.css">


    <!-- Mi CSS -->
    <link rel="stylesheet" href="/src/styles/style.css">

    <!--Envio de emails-->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

    <!-- Font Awesome y SweetAlert2 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.24/dist/sweetalert2.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.24/dist/sweetalert2.all.min.js"></script>

    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
</head>

<body>

    <header id="header" class="header_contacto">

        <nav class="container-fluid" aria-label="Menú principal">

            <div class="logo">
                <a href="./" aria-label="Ir a la página de inicio">
                    <img src="/src/assets/t_chuy.png" alt="Logo Talabarteria Chuy" class="ico">
                </a>

                <h2 class="title_">Talabarteria Chuy</h2>
            </div>

            <!-- menú hamburguesa cuando se ejecuta en pantalla chica -->
            <input type="checkbox" id="menu-toggle" aria-label="Mostrar u ocultar menú de navegación">
            <label for="menu-toggle" class="menu-icon" aria-hidden="true">&#9776;</label>

            <ul class="menu">
                <li class="items"><a href="../index.html">Inicio</a></li>
                <li class="items"><a href="store.html">Tienda</a></li>
            </ul>
        </nav>


    </header>

    <main>
        <section>
            <div class="formulario">

                <div class="form">
    
                    <div class="titulo">
                        <img src="images/logo_5.png" alt="" class="ico-form">
    
                        <h1>FORMULARIO DE CONTACTO</h1>
                        <h3 class="subtitle">No dudes en comunicarte con nosotros</h3>
    
                    </div>
    
                    <form>
                        <div class="form-group">
                            <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>
                        </div>
    
                        <div class="form-group">
                            <input type="text" id="apellido" name="apellido" placeholder="Tu apellido" required>
                        </div>
    
                        <div class="form-group">
                            <input type="email" id="email" name="email" placeholder="Tu email" required>
                        </div>
    
                        <div class="form-group">
                            <textarea id="mensaje" name="mensaje" placeholder="Tu mensaje" rows="4" required></textarea>
                        </div>
                        
                        <button type="button" id="enviar" class="btn-submit">Enviar</button>
                    </form>
            
                </div>
        </section>
    </main>

    <footer class="container-fluid">
         <div class="container-fluid d-flex justify-content-around align-items-center flex-wrap gap-4">

            <div class="conte">
                <p class="txt_footer">Contacto</p>
                
                <div class="d-flex gap-3">
                    <a href="#"><i class="bi bi-whatsapp fs-4"></i></a>
                    <a href="#"><i class="bi bi-envelope fs-4"></i></a>
                </div>

            </div>

            <div class="conte">
                <p class="txt_footer">Social</p>

                <div class="d-flex gap-3">
                    <a href="#"><i class="bi bi-facebook fs-4"></i></a>
                    <a href="#"><i class="bi bi-instagram fs-4"></i></a>
                    <a href="#"><i class="bi bi-linkedin fs-4"></i></a>
                </div>
            </div>

            <div class="conte">
                <!--
                <p class="txt_footer">Design by</p>
                -->
                <div class="ico_content">
                    <img src="/src/assets/logo_50x50.png" alt="" class="">
                </div>
                
            </div>
        </div>

        <div class="d-flex justify-content-center align-items-center" >
                <p class="footer_aling">© 2026 Talabarteria Chuy by <a href="">Design System</a> - Todos los derechos reservados.</p>
        </div>
        
    </footer>


    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS externo -->
    <script type="module" src="/src/main.ts"></script>
</body>

</html>
